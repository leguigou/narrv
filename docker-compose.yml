services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-https://narrv.deloffre.fr}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/narrv.sqlite
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_MAX_INPUT_CHARACTERS=${DEEPSEEK_MAX_INPUT_CHARACTERS:-45000}
      - YT_DLP_PATH=${YT_DLP_PATH:-yt-dlp}
      - YT_DLP_SLEEP_REQUESTS=${YT_DLP_SLEEP_REQUESTS:-1}
      - YT_DLP_RETRIES=${YT_DLP_RETRIES:-5}
      - YT_DLP_RETRY_SLEEP=${YT_DLP_RETRY_SLEEP:-http:exp=1:20}
      - YOUTUBE_COOKIES_PATH=${YOUTUBE_COOKIES_PATH:-/var/www/storage/app/youtube-cookies.txt}
      - YOUTUBE_COOKIES_BASE64=${YOUTUBE_COOKIES_BASE64:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - narrv_storage:/var/www/storage
      - narrv_database:/var/www/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  narrv_storage:
    name: narrv_storage
  narrv_database:
    name: narrv_database
