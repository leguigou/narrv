services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-https://narrv.deloffre.fr}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/narrv.sqlite
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    labels:
      - "traefik.enable=true"
      - traefik.http.routers.narrv.rule=Host(`narrv.deloffre.fr`)
      - "traefik.http.routers.narrv.entrypoints=websecure"
      - "traefik.http.services.narrv.loadbalancer.server.port=80"
    volumes:
      - narrv_storage:/var/www/storage
      - narrv_database:/var/www/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  narrv_storage:
  narrv_database:
